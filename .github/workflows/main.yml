name: Tests

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  tests:
    name: Run CodeceptJS tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate Codecept definitions
        run: npx codeceptjs def

      - name: Run tests
        env:
          HEADLESS: "true"
          
        run: |
          rm -rf output || true
          mkdir -p output
          npm run test

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: output/allure-results/**
          if-no-files-found: warn
          retention-days: 7
          
      - name: Upload test output (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codecept-output
          path: output/**
          if-no-files-found: warn
          retention-days: 7


  allure-report:
    name: Build & Publish Allure Report
    if: always()              
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (must include allure-commandline)
        run: npm ci

      - name: Download Allure raw results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: ./allure-results

      - name: Build Allure report
        run: |
          npx allure generate ./allure-results --clean -o ./allure-report || echo "No Allure results found"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
